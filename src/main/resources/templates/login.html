<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="shortcut icon" href="/img/logo1.png" type="image/x-icon">
    <link rel="stylesheet" href="/css/login/login.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Войти</title>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="header-content">
                <nav class="header-navigation">
                    <ul class="header-list">
                        <li class="header-list__item">
                            <a th:href="@{/}" class="header-list__link">
                                Главная
                            </a>
                        </li>
                        <li class="header-list__item">
                            <a th:href="@{/chat}" class="header-list__link">
                                Чат
                            </a>
                        </li>
                        <li class="header-list__item">
                            <a th:href="@{news}" class="header-list__link">
                                Новости
                            </a>
                        </li>
                        <li class="header-list__item">
                            <a th:href="@{/profile}" class="header-list__link">
                                Профиль
                            </a>
                        </li>
                        <li class="header-list__item-active">
                            <a th:href="@{/login}" class="header-list__link-active">
                                Войти
                            </a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>
    <div class="container">
        <div class="login-content">
            <h1>Войти</h1>
            <div class="login-forms">
                <form method="post" th:action="@{/login}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <div th:if="${param.error}" style="color: red">Неверный логин или пароль!</div>
                    <input type="text" name="username" id="login" placeholder="Введите логин">
                    <input type="password" name="password" id="password" placeholder="Введите пароль">
                    <button type="submit" id="btn_register">Войти</button>
                </form>
            </div>
            <a th:href="@{/register}">Ещё нет аккаунта?</a>
        </div>
    </div>
</body>
</html>
